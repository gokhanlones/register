<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | Astro Notlarım</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        .btn-google { 
            background-color: #ffffff; 
            border: 1px solid #d1d5db; 
            color: #374151; 
            margin-top: 10px; 
            width: 100%; 
            padding: 14px; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: background 0.2s; 
        }
        .btn-google:hover { background-color: #f9fafb; }

    </style>
</head>
<body>

    <div class="app-container">
        <header class="brand-section">
            <div class="logo-wrapper">
                <img src="logo.png" alt="Astro Notlarım Logo" class="logo-img">
            </div>
            <h1>Astro Notlarım</h1>
        </header>

        <main class="scrollable-form-section">
            <form class="register-form" id="registerForm" onsubmit="return false;">

                <div class="form-group" id="group-fullname">
                    <div class="input-wrapper">
                        <input type="text" id="fullname" placeholder="Ad Soyad">
                    </div>
                    <div class="error-message">Lütfen ad soyad girin.</div>
                </div>

                <div class="form-group" id="group-email">
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="E-posta">
                    </div>
                    <div class="error-message">Lütfen geçerli bir e-posta adresi girin.</div>
                </div>

                <div class="form-group" id="group-password">
                    <div class="input-wrapper">
                        <input type="password" id="password" class="password-input" placeholder="Şifre">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="eye-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>
                        </button>
                    </div>
                    <div class="error-message">Şifre en az 6 karakter olmalıdır.</div>
                </div>

                <div class="form-group" id="group-confirm-password">
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" class="password-input" placeholder="Şifre Tekrar">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirmPassword', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="eye-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>
                        </button>
                    </div>
                    <div class="error-message">Şifreler eşleşmiyor.</div>
                </div>



                <button type="button" class="btn-submit" id="registerBtn" onclick="handleRegister()">Kayıt Ol</button>
                <button type="button" class="btn-google" onclick="handleGoogleRegister()">Google ile Kayıt Ol</button>
            </form>

            <footer class="register-footer">
                <p>Zaten üye misin? <a href="login.html">Giriş yap</a></p>
            </footer>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAFRhlbnY4Fq67Wl-E8yis5msD6K-QZjbU",
            authDomain: "astro-notlarim.firebaseapp.com",
            projectId: "astro-notlarim",
            storageBucket: "astro-notlarim.firebasestorage.app",
            messagingSenderId: "123654326926",
            appId: "1:123654326926:web:44ba9bf34fcea3bf5ad7df",
            measurementId: "G-19BSBWLJ7X"
        };
        firebase.initializeApp(firebaseConfig);

        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            input.type = input.type === "password" ? "text" : "password";
            button.classList.toggle("visible");
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function handleRegister() {
            document.querySelectorAll('.form-group').forEach(el => el.classList.remove('has-error'));

            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            let isValid = true;

            if (fullname === "") {
                document.getElementById('group-fullname').classList.add('has-error');
                isValid = false;
            }
            if (!validateEmail(email)) {
                document.getElementById('group-email').classList.add('has-error');
                isValid = false;
            }
            if (password.length < 6) {
                document.getElementById('group-password').classList.add('has-error');
                isValid = false;
            }
            if (password !== confirmPassword || confirmPassword === "") {
                document.getElementById('group-confirm-password').classList.add('has-error');
                isValid = false;
            }
            if (!isValid) return;

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = "Kayıt oluşturuluyor...";

            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;

                    return user.updateProfile({ displayName: fullname })
                        .then(() => user.sendEmailVerification())
                        .then(() => {
                            sessionStorage.setItem('temp_fullname', fullname);
                            sessionStorage.setItem('temp_email', email);
                            sessionStorage.setItem('temp_device_info', JSON.stringify({
                                userAgent: navigator.userAgent,
                                platform: navigator.platform,
                                language: navigator.language
                            }));
                            window.location.href = "terms.html";
                        });
                })
                .catch(err => {
                    alert("Hata: " + err.message);
                    btn.disabled = false;
                    btn.textContent = "Kayıt Ol";
                });
        }

        function handleGoogleRegister() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    const isNewUser = result.additionalUserInfo.isNewUser;

                    if (!isNewUser) {
                        alert("Bu Google hesabı zaten kayıtlı. Giriş yapılıyor...");
                        window.location.href = "dashboard.html";
                        return;
                    }

                    sessionStorage.setItem('temp_fullname', user.displayName || "");
                    sessionStorage.setItem('temp_email', user.email || "");
                    sessionStorage.setItem('temp_device_info', JSON.stringify({
                        userAgent: navigator.userAgent,
                        platform: navigator.platform,
                        language: navigator.language
                    }));
                    window.location.href = "terms.html";
                })
                .catch(err => alert("Google kaydı başarısız: " + err.message));
        }
    </script>
</body>
</html>
