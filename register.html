<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | Astro Notlarım</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>

    <div class="app-container">
        
        <header class="brand-section">
            <div class="logo-wrapper">
                <img src="logo.png" alt="Astro Notlarım Logo" class="logo-img">
            </div>
            <h1>Astro Notlarım</h1>
        </header>

        <main class="scrollable-form-section">
            <form class="register-form" id="registerForm" novalidate onsubmit="return false;">
                
                <div class="form-group" id="group-fullname">
                    <div class="input-wrapper">
                        <input type="text" id="fullname" name="fullname" placeholder="İsim Soyisim">
                    </div>
                    <div class="error-message">Lütfen geçerli bir isim ve soyisim girin.</div>
                </div>

                <div class="form-group" id="group-email">
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="E-posta">
                    </div>
                    <div class="error-message">E-posta adresi hatalı veya boş bırakılamaz.</div>
                </div>

                <div class="form-group" id="group-password">
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="password-input" placeholder="Şifre">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="eye-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                    <div class="error-message">Şifre en az 6 karakterden oluşmalıdır.</div>
                </div>

                <div class="form-group" id="group-password-confirm">
                    <div class="input-wrapper">
                        <input type="password" id="password-confirm" name="password-confirm" class="password-input" placeholder="Şifreyi doğrula">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password-confirm', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="eye-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                    <div class="error-message">Girdiğiniz şifreler birbiriyle eşleşmiyor.</div>
                </div>

                <button type="button" class="btn-submit" id="submitBtn">Devam Et</button>

            </form>

            <footer class="register-footer">
                <p>Zaten üye misin? <a href="login.html">Giriş</a></p>
            </footer>
        </main>

    </div>

    <script>
        // Astro Notlarım Orijinal Firebase Yapılandırması
        const firebaseConfig = {
          apiKey: "AIzaSyAFRhlbnY4Fq67Wl-E8yis5msD6K-QZjbU",
          authDomain: "astro-notlarim.firebaseapp.com",
          projectId: "astro-notlarim",
          storageBucket: "astro-notlarim.firebasestorage.app",
          messagingSenderId: "123654326926",
          appId: "1:123654326926:web:44ba9bf34fcea3bf5ad7df",
          measurementId: "G-19BSBWLJ7X"
        };

        // Firebase Başlat
        firebase.initializeApp(firebaseConfig);

        function togglePasswordVisibility(inputId, button) {
            const passwordInput = document.getElementById(inputId);
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                button.classList.add("visible");
            } else {
                passwordInput.type = "password";
                button.classList.remove("visible");
            }
        }

        document.getElementById('submitBtn').addEventListener('click', function(e) {
            
            // Önceki hata sınıflarını temizle
            document.querySelectorAll('.form-group').forEach(function(element) {
                element.classList.remove('has-error');
            });

            let isValid = true;

            const fullname = document.getElementById('fullname');
            if (fullname.value.trim().length < 3) {
                document.getElementById('group-fullname').classList.add('has-error');
                isValid = false;
            }

            const email = document.getElementById('email');
            if (!email.value.includes('@') || email.value.trim() === "") {
                document.getElementById('group-email').classList.add('has-error');
                isValid = false;
            }

            const password = document.getElementById('password');
            if (password.value.length < 6) {
                document.getElementById('group-password').classList.add('has-error');
                isValid = false;
            }

            const passwordConfirm = document.getElementById('password-confirm');
            if (passwordConfirm.value !== password.value || passwordConfirm.value === "") {
                document.getElementById('group-password-confirm').classList.add('has-error');
                isValid = false;
            }

            // FORM KONTROLLERİ GEÇERLİYSE FIREBASE KAYIT VE DOĞRULAMA ADIMI BAŞLAR
            if (isValid) {
                const submitBtn = document.getElementById('submitBtn');
                
                // Çift tıklamayı önlemek için arayüzü kilitle
                submitBtn.disabled = true;
                submitBtn.textContent = "Hesap Oluşturuluyor...";

                const emailValue = email.value.trim();
                const passwordValue = password.value;
                const fullnameValue = fullname.value.trim();

                // ADIM 1: Firebase Auth ile kullanıcı kaydını doğrudan tetikle
                firebase.auth().createUserWithEmailAndPassword(emailValue, passwordValue)
                    .then((userCredential) => {
                        const user = userCredential.user;
                        // Kullanıcının profil ismini (displayName) güncelle
                        return user.updateProfile({ displayName: fullnameValue }).then(() => user);
                    })
                    .then((user) => {
                        // ADIM 2: Kullanıcı oluştu, şimdi E-posta Doğrulama Linkini gönder
                        return user.sendEmailVerification();
                    })
                    .then(() => {
                        // ADIM 3: Cihaz verilerini arka planda topla
                        const deviceInfo = {
                            userAgent: navigator.userAgent,
                            platform: navigator.platform,
                            language: navigator.language,
                            screenResolution: `${window.screen.width}x${window.screen.height}`
                        };

                        // Firestore'a daha sonra yazılacak ek bilgileri geçici hafızaya atıyoruz
                        sessionStorage.setItem('temp_fullname', fullnameValue);
                        sessionStorage.setItem('temp_email', emailValue);
                        sessionStorage.setItem('temp_device_info', JSON.stringify(deviceInfo));

                        // Kullanıcıyı bilgilendir ve Yasal Onay sayfasına yönlendir
                        alert("Hesabınız başarıyla oluşturuldu! Lütfen " + emailValue + " adresine gönderilen doğrulama linkine tıklayın, ardından yasal onayı tamamlamak için devam edin.");
                        window.location.href = "terms.html";
                    })
                    .catch((error) => {
                        // Hata durumunda butonu eski haline getir
                        submitBtn.disabled = false;
                        submitBtn.textContent = "Devam Et";

                        // Özel e-posta zaten var hatası kontrolü
                        if (error.code === 'auth/email-already-in-use') {
                            alert("Bu e-posta adresi zaten kullanımda! Lütfen giriş yapmayı deneyin veya farklı bir e-posta kullanın.");
                        } else {
                            alert("Kayıt sırasında bir hata oluştu: " + error.message);
                        }
                    });
            }
        });
    </script>

</body>
</html>
