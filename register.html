<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | Astro Notlarım</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>

    <div class="app-container">
        
        <header class="brand-section">
            <div class="logo-wrapper">
                <img src="logo.png" alt="Astro Notlarım Logo" class="logo-img">
            </div>
            <h1>Astro Notlarım</h1>
        </header>

        <main class="scrollable-form-section">
            <form action="#" method="POST" class="register-form" id="registerForm" novalidate>
                
                <div class="form-group" id="group-fullname">
                    <div class="input-wrapper">
                        <input type="text" id="fullname" name="fullname" placeholder="İsim Soyisim">
                    </div>
                    <div class="error-message" id="err-fullname">Lütfen geçerli bir isim ve soyisim girin.</div>
                </div>

                <div class="form-group" id="group-email">
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="E-posta">
                    </div>
                    <div class="error-message" id="err-email">E-posta adresi hatalı veya boş bırakılamaz.</div>
                </div>

                <div class="form-group" id="group-password">
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="password-input" placeholder="Şifre">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="eye-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                    <div class="error-message" id="err-password">Şifre en az 6 karakterden oluşmalıdır.</div>
                </div>

                <div class="form-group" id="group-password-confirm">
                    <div class="input-wrapper">
                        <input type="password" id="password-confirm" name="password-confirm" class="password-input" placeholder="Şifreyi doğrula">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password-confirm', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="eye-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                    <div class="error-message" id="err-password-confirm">Girdiğiniz şifreler birbiriyle eşleşmiyor.</div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Kaydet</button>

            </form>

            <footer class="register-footer">
                <p>Zaten üye misin? <a href="login.html">Giriş</a></p>
            </footer>
        </main>

    </div>

    <script>
        // Projenize Ait Gerçek Firebase Yapılandırma Bilgileri
        const firebaseConfig = {
            apiKey: "AIzaSyAFRhlbnY4Fq67Wl-E8yis5msD6K-QZjbu",
            authDomain: "astro-notlarim.firebaseapp.com",
            projectId: "astro-notlarim",
            storageBucket: "astro-notlarim.firebasestorage.app",
            messagingSenderId: "123654326926",
            appId: "1:123654326926:web:44ba9bf34fcea3bf5ad7df",
            measurementId: "G-19BSBWLJ7X"
        };

        // Firebase Başlatıcı
        firebase.initializeApp(firebaseConfig);

        // Göz İkonuna Tıklandığında Şifreyi Göster/Gizle Fonksiyonu
        function togglePasswordVisibility(inputId, button) {
            const passwordInput = document.getElementById(inputId);
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                button.classList.add("visible");
            } else {
                passwordInput.type = "password";
                button.classList.remove("visible");
            }
        }

        // Form Gönderildiğinde Çalışacak Ana Algoritma
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');

            // Hata sınıflarını ve özel Firebase uyarı metinlerini temizle temizle
            document.querySelectorAll('.form-group').forEach(function(element) {
                element.classList.remove('has-error');
            });
            document.getElementById('err-email').textContent = "E-posta adresi hatalı veya boş bırakılamaz.";
            document.getElementById('err-password').textContent = "Şifre en az 6 karakterden oluşmalıdır.";

            let isValid = true;

            // 1. Doğrulama: İsim Soyisim Kontrolü
            const fullname = document.getElementById('fullname');
            if (fullname.value.trim().length < 3) {
                document.getElementById('group-fullname').classList.add('has-error');
                isValid = false;
            }

            // 2. Doğrulama: E-posta Kontrolü
            const email = document.getElementById('email');
            if (!email.value.includes('@') || email.value.trim() === "") {
                document.getElementById('group-email').classList.add('has-error');
                isValid = false;
            }

            // 3. Doğrulama: Şifre Kontrolü
            const password = document.getElementById('password');
            if (password.value.length < 6) {
                document.getElementById('group-password').classList.add('has-error');
                isValid = false;
            }

            // 4. Doğrulama: Şifre Eşleşme Kontrolü
            const passwordConfirm = document.getElementById('password-confirm');
            if (passwordConfirm.value !== password.value || passwordConfirm.value === "") {
                document.getElementById('group-password-confirm').classList.add('has-error');
                isValid = false;
            }

            // TÜM KONTROLLERDEN GEÇTİYSE FIREBASE KAYIT İŞLEMİNİ BAŞLAT
            if (isValid) {
                // Arayüzün kilitlenmemesi ve çift istek gitmemesi için butonu pasif yap
                submitBtn.disabled = true;
                submitBtn.textContent = "Kaydediliyor...";

                // Firebase Auth Hesabı Oluşturma
                firebase.auth().createUserWithEmailAndPassword(email.value.trim(), password.value)
                    .then((userCredential) => {
                        const user = userCredential.user;
                        
                        // Başarılı kayıttan sonra kullanıcının Adını Firebase profiline işle
                        return user.updateProfile({
                            displayName: fullname.value.trim()
                        });
                    })
                    .then(() => {
                        // İşlem tamam, sözleşme (yasal onay) sayfasına akıcı geçiş yap
                        window.location.href = "terms.html";
                    })
                    .catch((error) => {
                        // Hata gelirse butonu tekrar aktif et
                        submitBtn.disabled = false;
                        submitBtn.textContent = "Kaydet";

                        const errorCode = error.code;
                        console.error("Firebase Hata Kodu:", errorCode);

                        // Gelen hatayı ilgili kutunun altına dinamik olarak yerleştirme
                        if (errorCode === 'auth/email-already-in-use') {
                            document.getElementById('err-email').textContent = "Bu e-posta adresi zaten kullanımda.";
                            document.getElementById('group-email').classList.add('has-error');
                        } else if (errorCode === 'auth/invalid-email') {
                            document.getElementById('err-email').textContent = "Lütfen geçerli bir e-posta formatı girin.";
                            document.getElementById('group-email').classList.add('has-error');
                        } else if (errorCode === 'auth/weak-password') {
                            document.getElementById('err-password').textContent = "Şifre zayıf. Lütfen daha güçlü bir şifre seçin.";
                            document.getElementById('group-password').classList.add('has-error');
                        } else {
                            document.getElementById('err-email').textContent = "Hata oluştu: " + error.message;
                            document.getElementById('group-email').classList.add('has-error');
                        }
                    });
            }
        });
    </script>

</body>
</html>
