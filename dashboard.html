<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anasayfa | Astro Notlarım</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-remote-config-compat.js"></script>

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        .greeting-section {
            padding: 20px 20px 12px;
            background-color: #ffffff;
            border-bottom: 1px solid #f3f4f6;
            flex-shrink: 0;
            text-align: center;
        }
        .greeting-text {
            font-size: 1.1rem;
            color: #6b7280;
            margin-bottom: 6px;
        }
        .user-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: -0.5px;
            min-height: 2.2rem;
        }

        .astro-icons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 8px;
        }
        .astro-icon-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            transition: transform 0.2s;
            outline: none;
        }
        .astro-icon-btn:active {
            transform: scale(0.95);
        }
        .astro-icon-btn svg {
            width: 48px;
            height: 48px;
            padding: 10px;
            border-radius: 50%;
            background-color: #f9fafb;
            border: 2px solid #e5e7eb;
            color: #d4af37;
            transition: all 0.2s;
        }
        .astro-icon-btn:hover svg {
            background-color: #000000;
            border-color: #000000;
            color: #d4af37;
        }
        .astro-icon-btn span {
            font-size: 0.75rem;
            color: #6b7280;
            font-weight: 500;
        }

        /* === GÜNLÜK YORUM KARTI === */
        .daily-horoscope-card {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            color: #1f2937;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #f3f4f6;
        }
        .daily-horoscope-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .daily-horoscope-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #d4af37;
        }
        .daily-horoscope-date {
            font-size: 0.8rem;
            color: #9ca3af;
        }
        .daily-horoscope-text {
            font-size: 0.95rem;
            line-height: 1.7;
            color: #374151;
            margin-bottom: 16px;
        }
        .daily-horoscope-text .theme-tag {
            display: inline-block;
            background-color: #fef9e7;
            color: #b8860b;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 8px;
        }
        .score-bars {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .score-bar-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .score-bar-label {
            font-size: 0.8rem;
            color: #6b7280;
            width: 60px;
            text-align: right;
            font-weight: 500;
        }
        .score-bar-track {
            flex: 1;
            height: 8px;
            background-color: #f3f4f6;
            border-radius: 4px;
            overflow: hidden;
        }
        .score-bar-fill {
            height: 100%;
            border-radius: 4px;
            background-color: #d4af37;
            transition: width 0.5s ease;
        }
        .score-bar-value {
            font-size: 0.8rem;
            color: #d4af37;
            width: 30px;
            font-weight: 600;
        }

        .lucky-info {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #f3f4f6;
        }
        .lucky-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #6b7280;
        }
        .lucky-item svg {
            width: 16px;
            height: 16px;
            color: #d4af37;
        }

        .category-scroll-wrapper {
            padding: 16px 0;
            background-color: #ffffff;
            border-top: 1px solid #f3f4f6;
            flex-shrink: 0;
        }
        .category-scroll {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 0 20px;
        }
        .category-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            min-width: 80px;
        }
        .category-btn:active {
            transform: scale(0.95);
        }
        .category-btn:hover {
            background-color: #000000;
            border-color: #000000;
        }
        .category-btn:hover .category-text {
            color: #d4af37;
        }
        .category-text {
            font-size: 0.9rem;
            font-weight: 600;
            color: #374151;
            white-space: nowrap;
        }

        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: flex-end;
        }
        .popup-overlay.show {
            display: flex;
        }
        .popup-content {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 20px 20px 0 0;
            padding: 24px 20px 32px;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            max-height: 70vh;
            overflow-y: auto;
        }
        .popup-overlay.show .popup-content {
            transform: translateY(0);
        }
        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 1px solid #f3f4f6;
            padding-bottom: 12px;
        }
        .popup-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #000000;
        }
        .popup-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px;
            outline: none;
        }
        .popup-body {
            color: #4b5563;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .popup-score {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .popup-score-bar {
            flex: 1;
            height: 10px;
            background-color: #f3f4f6;
            border-radius: 5px;
            overflow: hidden;
        }
        .popup-score-fill {
            height: 100%;
            border-radius: 5px;
            background-color: #d4af37;
        }
        .popup-score-value {
            font-size: 1rem;
            font-weight: 700;
            color: #d4af37;
            width: 40px;
            text-align: right;
        }

        .dashboard-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }
        .dashboard-content::-webkit-scrollbar {
            width: 4px;
        }
        .dashboard-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .dashboard-content::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: #9ca3af;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f4f6;
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="brand-section">
            <button class="btn-menu">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <h1>Astro Notlarım</h1>
        </header>

        <div class="greeting-section" id="greetingSection">
            <div class="greeting-text">Merhaba</div>
            <div class="user-name" id="userName">...</div>

            <div class="astro-icons">
                <button class="astro-icon-btn" onclick="openAstroPopup('sun')" title="Güneş">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>

                        <circle cx="12" cy="12" r="10"></circle>

                <button class="astro-icon-btn" onclick="openAstroPopup('moon')" title="Ay">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        <main class="dashboard-content" id="dashboardContent">
            <div class="loading-state" id="loadingState">

        <div class="category-scroll-wrapper">
            <div class="category-scroll">

                <button class="category-btn" onclick="openCategoryPopup('career')">
                    <span class="category-text">Kariyer</span>

                <button class="category-btn" onclick="openCategoryPopup('money')">

        </div>

        <footer class="bottom-navbar">
            <a href="dashboard.html" class="nav-item active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="nav-label">Anasayfa</span>

            <a href="ask.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span class="nav-label">Sor</span>

            <a href="natal.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M2 12h20"></path><path d="M4.5 8h15"></path><path d="M4.5 16h15"></path></svg>
                <span class="nav-label">Harita</span>

    <div class="popup-overlay" id="astroPopupOverlay" onclick="closeAstroPopup(event)">
        <div class="popup-content" onclick="event.stopPropagation()">
            <div class="popup-header">
                <div class="popup-title" id="astroPopupTitle">Bilgi</div>
                <button class="popup-close" onclick="closeAstroPopup()">&times;</button>
            </div>
            <div class="popup-body" id="astroPopupBody">
                Buraya bilgi gelecek.
            </div>
        </div>
    </div>

    <div class="popup-overlay" id="popupOverlay" onclick="closePopup(event)">
        <div class="popup-content" onclick="event.stopPropagation()">
            <div class="popup-header">
                <div class="popup-title" id="popupTitle">Bilgi</div>
                <button class="popup-close" onclick="closePopup()">&times;</button>
            </div>
            <div class="popup-body" id="popupBody">
                Buraya bilgi gelecek.
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAFRhlbnY4Fq67Wl-E8yis5msD6K-QZjbU",
            authDomain: "astro-notlarim.firebaseapp.com",
            projectId: "astro-notlarim",
            storageBucket: "astro-notlarim.firebasestorage.app",
            messagingSenderId: "123654326926",
            appId: "1:123654326926:web:44ba9bf34fcea3bf5ad7df",
            measurementId: "G-19BSBWLJ7X"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const remoteConfig = firebase.remoteConfig();
        remoteConfig.settings = { minimumFetchIntervalMillis: 60000 };

        // Kullanıcı verileri
        let currentUser = null;
        let userProfileData = null;
        let dailyHoroscopeData = null;
        let userSunSign = null;

        const signNames = {
            aries: 'Koç', taurus: 'Boğa', gemini: 'İkizler', cancer: 'Yengeç',
            leo: 'Aslan', virgo: 'Başak', libra: 'Terazi', scorpio: 'Akrep',
            sagittarius: 'Yay', capricorn: 'Oğlak', aquarius: 'Kova', pisces: 'Balık'
        };

        const categoryNames = {
            love: 'Aşk',
            career: 'Kariyer',
            money: 'Para',
            health: 'Sağlık'
        };

        // Önce localStorage'dan cached ismi hemen göster
        const cachedName = localStorage.getItem('astro_user_name');
        if (cachedName) {
            document.getElementById('userName').textContent = cachedName;
        }

        // Firebase Auth state değişikliği
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            currentUser = user;
            loadUserData(user);
        });

        async function loadUserData(user) {
            try {
                const doc = await db.collection("user_profiles").doc(user.uid).get();

                if (!doc.exists) {
                    window.location.href = "birthinfo.html";
                    return;
                }

                userProfileData = doc.data();

                // İsim güncelle
                const fullname = userProfileData.fullname || user.displayName || "Kullanıcı";
                document.getElementById('userName').textContent = fullname;
                localStorage.setItem('astro_user_name', fullname);

                // Astro ikon etiketleri
                updateAstroLabels();

                // Günlük burç verisini kontrol et ve yükle
                await loadDailyHoroscope();

            } catch (err) {
                console.error("Veri çekme hatası:", err);
                document.getElementById('userName').textContent = user.displayName || "Kullanıcı";
            }
        }

        function updateAstroLabels() {
            if (!userProfileData) return;

            if (userProfileData.sunSign) {
                const signName = signNames[userProfileData.sunSign.signId] || userProfileData.sunSign.sign;
                document.getElementById('sunLabel').textContent = `Güneş ${signName}`;
                userSunSign = userProfileData.sunSign.signId;
            }
            if (userProfileData.moonSign) {
                const signName = signNames[userProfileData.moonSign.signId] || userProfileData.moonSign.sign;
                document.getElementById('moonLabel').textContent = `Ay ${signName}`;
            }
            if (userProfileData.risingSign) {
                const signName = signNames[userProfileData.risingSign.signId] || userProfileData.risingSign.sign;
                document.getElementById('risingLabel').textContent = `Yükselen ${signName}`;
            }
        }

        // Günlük burç verisini kontrol et ve yükle
        async function loadDailyHoroscope() {
            if (!userProfileData) {
                showNoDataState();
                return;
            }

            // sunSign yoksa doğum bilgilerinden hesapla
            if (!userSunSign && userProfileData.birthMonth && userProfileData.birthDay) {
                userSunSign = getSunSignFromDate(userProfileData.birthMonth, userProfileData.birthDay);
            }

            if (!userSunSign) {
                showNoDataState();
                return;
            }

            const horoscope = userProfileData.dailyHoroscope;

            // Veri yoksa API'den çek
            if (!horoscope) {
                await fetchAndSaveHoroscope();
                return;
            }

            // Son güncelleme tarihi kontrolü (24 saat)
            const lastUpdate = horoscope.fetchedAt ? horoscope.fetchedAt.toDate() : null;
            const now = new Date();
            const hoursDiff = lastUpdate ? (now - lastUpdate) / (1000 * 60 * 60) : 25;

            if (hoursDiff >= 24) {
                await fetchAndSaveHoroscope();
            } else {
                dailyHoroscopeData = horoscope;
                renderHoroscopeCard();
            }
        }

        // Doğum tarihinden Güneş burcunu hesapla
        function getSunSignFromDate(month, day) {
            if ((month === 3 && day >= 21) || (month === 4 && day <= 19)) return 'aries';
            if ((month === 4 && day >= 20) || (month === 5 && day <= 20)) return 'taurus';
            if ((month === 5 && day >= 21) || (month === 6 && day <= 20)) return 'gemini';
            if ((month === 6 && day >= 21) || (month === 7 && day <= 22)) return 'cancer';
            if ((month === 7 && day >= 23) || (month === 8 && day <= 22)) return 'leo';
            if ((month === 8 && day >= 23) || (month === 9 && day <= 22)) return 'virgo';
            if ((month === 9 && day >= 23) || (month === 10 && day <= 22)) return 'libra';
            if ((month === 10 && day >= 23) || (month === 11 && day <= 21)) return 'scorpio';
            if ((month === 11 && day >= 22) || (month === 12 && day <= 21)) return 'sagittarius';
            if ((month === 12 && day >= 22) || (month === 1 && day <= 19)) return 'capricorn';
            if ((month === 1 && day >= 20) || (month === 2 && day <= 18)) return 'aquarius';
            if ((month === 2 && day >= 19) || (month === 3 && day <= 20)) return 'pisces';
            return null;
        }

        // API'den günlük burç çek ve Firestore'a kaydet
        async function fetchAndSaveHoroscope() {
            try {
                await remoteConfig.fetchAndActivate();
                const apiKey = remoteConfig.getString('astro_api_key');

                if (!apiKey || apiKey === "(in-app default)") {
                    throw new Error("API Anahtarı bulunamadı.");
                }

                const today = new Date().toISOString().split('T')[0];
                const apiUrl = `https://api.freeastroapi.com/api/v2/horoscope/daily/sign?sign=${userSunSign}&date=${today}&tz_str=Europe%2FLondon&locale=en`;

                const response = await fetch(apiUrl, {
                    method: "GET",
                    headers: {
                        "x-api-key": apiKey,
                        "Content-Type": "application/json"
                    }
                });

                const data = await response.json();

                if (!response.ok || data.error) {
                    throw new Error(data.message || "API hatası");
                }

                // Firestore'a kaydet - score_factors'ü snake_case olarak kaydet
                const horoscopeData = {
                    dailyHoroscope: {
                        sign: data.data.sign,
                        date: data.data.date,
                        scores: data.data.scores,
                        content: data.data.content,
                        lucky: data.data.lucky,
                        astro: data.data.astro,
                        score_factors: data.data.score_factors || [],
                        fetchedAt: firebase.firestore.FieldValue.serverTimestamp()
                    },
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                await db.collection('user_profiles').doc(currentUser.uid).set(horoscopeData, { merge: true });

                // Veriyi güncelle ve göster
                dailyHoroscopeData = horoscopeData.dailyHoroscope;
                renderHoroscopeCard();

            } catch (err) {
                console.error("Horoscope hatası:", err);
                showErrorState(err.message);
            }
        }

        // Günlük burç kartını render et
        function renderHoroscopeCard() {
            if (!dailyHoroscopeData) {
                showNoDataState();
                return;
            }

            const scores = dailyHoroscopeData.scores;
            const content = dailyHoroscopeData.content;
            const lucky = dailyHoroscopeData.lucky;

            const cardHTML = `
                <div class="daily-horoscope-card">
                    <div class="daily-horoscope-header">
                        <div class="daily-horoscope-title">Günlük Yorum</div>
                        <div class="daily-horoscope-date">${dailyHoroscopeData.date}</div>
                    </div>
                    <div class="daily-horoscope-text">${content.text}
                        <br><span class="theme-tag">Tema: ${content.theme || ''}</span>
                    </div>

                    <div class="score-bars">
                        <div class="score-bar-item">
                            <div class="score-bar-label">Genel</div>
                            <div class="score-bar-track">
                                <div class="score-bar-fill" style="width: ${scores.overall}%"></div>
                            </div>
                            <div class="score-bar-value">${scores.overall}</div>
                        </div>
                        <div class="score-bar-item">
                            <div class="score-bar-label">Aşk</div>
                            <div class="score-bar-track">
                                <div class="score-bar-fill" style="width: ${scores.love}%"></div>
                            </div>
                            <div class="score-bar-value">${scores.love}</div>
                        </div>
                        <div class="score-bar-item">
                            <div class="score-bar-label">Kariyer</div>
                            <div class="score-bar-track">
                                <div class="score-bar-fill" style="width: ${scores.career}%"></div>
                            </div>
                            <div class="score-bar-value">${scores.career}</div>
                        </div>
                        <div class="score-bar-item">
                            <div class="score-bar-label">Para</div>
                            <div class="score-bar-track">
                                <div class="score-bar-fill" style="width: ${scores.money}%"></div>
                            </div>
                            <div class="score-bar-value">${scores.money}</div>
                        </div>
                        <div class="score-bar-item">
                            <div class="score-bar-label">Sağlık</div>
                            <div class="score-bar-track">
                                <div class="score-bar-fill" style="width: ${scores.health}%"></div>
                            </div>
                            <div class="score-bar-value">${scores.health}</div>
                        </div>
                    </div>

                    <div class="lucky-info">
                        <div class="lucky-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
                            ${lucky.color.label}
                        </div>
                        <div class="lucky-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                            ${lucky.number}
                        </div>
                        <div class="lucky-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                            ${lucky.time_window.display}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('horoscopeCard').innerHTML = cardHTML;
            document.getElementById('horoscopeCard').style.display = 'block';
        }

        function showNoDataState() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('horoscopeCard').innerHTML = `
                <div class="content-placeholder" style="background: #fef2f2; border: 1px dashed #fecaca; color: #991b1b; padding: 20px; border-radius: 12px; text-align: center;">
                    Doğum bilgileriniz eksik. Lütfen doğum bilgilerinizi güncelleyin.
                </div>
            `;
            document.getElementById('horoscopeCard').style.display = 'block';
        }

        function showErrorState(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('horoscopeCard').innerHTML = `
                <div class="content-placeholder" style="background: #fef2f2; border: 1px dashed #fecaca; color: #991b1b; padding: 20px; border-radius: 12px; text-align: center;">
                    Hata: ${message}<br>
                    <button onclick="loadDailyHoroscope()" style="margin-top: 12px; padding: 8px 16px; background: #000; color: #d4af37; border: none; border-radius: 8px; cursor: pointer;">Tekrar Dene</button>
                </div>
            `;
            document.getElementById('horoscopeCard').style.display = 'block';
        }

        // Astro popup (Güneş, Ay, Yükselen)
        function openAstroPopup(type) {
            if (!userProfileData) {
                document.getElementById('astroPopupTitle').textContent = 'Veri Bulunamadı';
                document.getElementById('astroPopupBody').textContent = 'Lütfen önce doğum bilgilerinizi kaydedin.';
                document.getElementById('astroPopupOverlay').classList.add('show');
                return;
            }

            const data = userProfileData[`${type}Sign`];

            if (!data) {
                document.getElementById('astroPopupTitle').textContent = 'Veri Bulunamadı';
                document.getElementById('astroPopupBody').textContent = 'Lütfen önce doğum bilgilerinizi kaydedin.';
                document.getElementById('astroPopupOverlay').classList.add('show');
                return;
            }

            const signName = signNames[data.signId] || data.sign;
            const titles = {
                sun: `Güneş ${signName}`,
                moon: `Ay ${signName}`,
                rising: `Yükselen ${signName}`
            };

            document.getElementById('astroPopupTitle').textContent = titles[type];
            document.getElementById('astroPopupBody').textContent = data.interpretation?.body || data.interpretation || 'Yorum bulunamadı.';
            document.getElementById('astroPopupOverlay').classList.add('show');
        }

        function closeAstroPopup(event) {
            if (!event || event.target === document.getElementById('astroPopupOverlay')) {
                document.getElementById('astroPopupOverlay').classList.remove('show');
            }
        }

        // API'den detay gelmediğinde puan seviyesine göre profesyonel yorum üreten motor
        function getDynamicInterpretation(type, score) {
            const interpretations = {
                love: {
                    high: {
                        main: "Yıldızlar aşk hayatında parlıyor! Bugün ilişkilerde çekim gücünün en yüksek olduğu şanslı günlerden biri.",
                        secondary: "Mevcut bir ilişkin varsa partnerinle arandaki uyum ve tutku derinleşebilir. Eğer kalbin boşsa, özgüveninin yüksek olduğu bu süreçte dikkat çekici enerjiler altındasın. Duygularını netçe ifade etmek için harika bir zaman."
                    },
                    medium: {
                        main: "Duygusal dengenin ve huzurun ön planda olduğu, akıcı bir gün.",
                        secondary: "İlişkilerde ne çok iddialı ne de çok mesafeli bir tutum var. Küçük ve samimi adımlarla bağlarınızı koruyabilirsiniz. Mevcut sorunları tatlı dille çözmek adına gökyüzü seni destekliyor."
                    },
                    low: {
                        main: "Gökyüzü ikili ilişkilerde seni biraz sakin kalmaya ve fevri olmamaya davet ediyor.",
                        secondary: "Bugün alınganlıklara, yanlış anlaşılmalara veya ego çatışmalarına açık bir zemin olabilir. Partnerinle veya flörtünle olan iletişiminde büyük kararlar almaktan kaçınmalı, enerjiyi akışına bırakmalısın."
                    }
                },
                career: {
                    high: {
                        main: "Kariyerinde ve günlük hedeflerinde liderlik yapabileceğin, parlayacağın bir gün!",
                        secondary: "Üzerinde çalıştığın işlerde dikkat toplayabilir, fikirlerinle takdir kazanabilirsin. İş arayışları, mülakatlar veya yarım kalan projeleri bitirmek adına motivasyonun ve kozmik desteğin tam."
                    },
                    medium: {
                        main: "İş ve sorumluluk hayatında rutinlerin sorunsuz aktığı, stabil bir gün.",
                        secondary: "Büyük riskler alıp maceralara atılmak yerine, mevcut düzeni korumak ve planlı ilerlemek daha verimli sonuçlar getirecektir. İşbirlikleri ve toplantılar için yapıcı bir atmosfer hakim."
                    },
                    low: {
                        main: "Mesleki konularda odaklanma sorunları veya ufak aksilikler yaşanabilir.",
                        secondary: "Bugün önemli sunumları, büyük sözleşmeleri veya radikal kariyer değişikliklerini mümkünse ertelemek faydalı olabilir. Enerjini planlama yapmaya ve detayları kontrol etmeye harcamalısın."
                    }
                },
                money: {
                    high: {
                        main: "Finansal konularda şanslı ve bereketli etkiler altındasın.",
                        secondary: "Beklediğin bir para girişi gerçekleşebilir, karlı bir alışveriş yapabilir veya bütçeni rahatlatacak yeni fikirler üretebilirsin. Maddi yatırımları planlarken sezgilerine güvenebileceğin bir süreç."
                    },
                    medium: {
                        main: "Maddi durumunda gelgitlerin olmadığı, dengeli bir bütçe dönemi.",
                        secondary: "Gelir ve gider dengeni iyi yönettiğin bir gündesin. Ne büyük bir kazanç ne de beklenmedik bir kayıp öngörülüyor. Harcamalarını akıllıca kontrol altında tutmaya devam etmelisin."
                    },
                    low: {
                        main: "Maddi konularda ve harcamalarda ekstra temkinli olman gereken bir gün.",
                        secondary: "Gereksiz harcamalar veya hesapsız alışverişler bütçeni sonradan zorlayabilir. Bugün riskli yatırımlardan, borç alıp vermekten uzak durmalı, cüzdanını korumaya odaklanmalısın."
                    }
                },
                health: {
                    high: {
                        main: "Zihinsel ve fiziksel enerjinin zirvede olduğu, son derece zinde bir gün!",
                        secondary: "Kendini her zamankinden daha güçlü, motive ve canlı hissetmen mümkün. Spor yapmak, yeni bir sağlıklı yaşam rutinine başlamak veya kişisel bakımına zaman ayırmak için mükemmel bir kozmik etki."
                    },
                    medium: {
                        main: "Sağlık durumunun stabil, sakin ve dengeli seyrettiği bir süreç.",
                        secondary: "Bedeninin sesini dinlemeli ve aşırı yüklenmelerden kaçınmalısın. Rutin dinlenme sürelerine sadık kaldığın sürece enerjini gün boyu harika bir dengede tutabilirsin."
                    },
                    low: {
                        main: "Bağışıklık sistemine, uyku düzenine ve dinlenmene özen göstermen gereken bir gün.",
                        secondary: "Kendini biraz yorgun veya halsiz hissetmen normal olabilir. Bugün bedenini çok zorlayacak ağır aktivitelerden kaçınmalı, stresten uzak kalmalı ve vitamin dengene dikkat etmelisin."
                    }
                }
            };

            let tier = 'medium';
            if (score >= 75) tier = 'high';
            else if (score < 45) tier = 'low';

            return interpretations[type]?.[tier] || { main: "Günlük enerjiler bu alanda dengeleniyor.", secondary: "İlerleyen saatlerde gökyüzü etkileri daha net şekillenecektir." };
        }

        // Kategori popup (Sağlık, Aşk, Kariyer, Para)
        function openCategoryPopup(type) {
            if (!dailyHoroscopeData) {
                document.getElementById('popupTitle').textContent = categoryNames[type] || 'Bilgi';
                document.getElementById('popupBody').textContent = 'Günlük yorum verisi henüz yüklenemedi.';
                document.getElementById('popupOverlay').classList.add('show');
                return;
            }

            const scoreFactors = dailyHoroscopeData.score_factors || [];
            const score = (dailyHoroscopeData.scores && dailyHoroscopeData.scores[type] !== undefined) ? dailyHoroscopeData.scores[type] : 50;
            const factor = scoreFactors.find(f => f.dimension === type);

            let reasonMain = "";
            let reasonSecondary = "";
            let drivers = [];

            // Eğer API'den score_factors içeriği geldiyse onu kullan, gelmediyse dinamik motoru çalıştır
            if (factor && factor.reason) {
                reasonMain = factor.reason.main || "";
                reasonSecondary = factor.reason.secondary || "";
                drivers = factor.drivers || [];
            } else {
                const dynamicContent = getDynamicInterpretation(type, score);
                reasonMain = dynamicContent.main;
                reasonSecondary = dynamicContent.secondary;
            }

            let bodyHTML = `
                <div class="popup-score">
                    <div class="popup-score-bar">
                        <div class="popup-score-fill" style="width: ${score}%"></div>
                    </div>
                    <div class="popup-score-value">${score}</div>
                </div>
                <p style="margin-top: 14px; font-size: 1rem; color: #1f2937;"><strong>${reasonMain}</strong></p>
            `;

            if (reasonSecondary) {
                bodyHTML += `<p style="margin-top: 8px; font-size: 0.95rem; color: #4b5563; line-height: 1.6;">${reasonSecondary}</p>`;
            }

            // Aktive eden gezegenler listesi (Eğer API'den geldiyse alt kısma ekler)
            if (drivers && drivers.length > 0) {
                bodyHTML += `<div style="margin-top: 16px; padding-top: 12px; border-top: 1px solid #f3f4f6;">`;
                bodyHTML += `<p style="font-size: 0.85rem; color: #6b7280; margin-bottom: 8px; font-weight: 600;">Etkileyen Gezegenler / Evler:</p>`;
                drivers.forEach(d => {
                    if (d.label) {
                        const houseText = d.house ? ` - ${d.house}. Ev` : '';
                        const intensityText = d.intensity ? ` (${d.intensity})` : '';
                        bodyHTML += `<p style="font-size: 0.85rem; color: #4b5563; margin: 4px 0;">• ${d.label}${houseText}${intensityText}</p>`;
                    }
                });
                bodyHTML += `</div>`;
            }

            document.getElementById('popupTitle').textContent = `${categoryNames[type]} - ${score}/100`;
            document.getElementById('popupBody').innerHTML = bodyHTML;
            document.getElementById('popupOverlay').classList.add('show');
        }

        function closePopup(event) {
            if (!event || event.target === document.getElementById('popupOverlay')) {
                document.getElementById('popupOverlay').classList.remove('show');
            }
        }
    </script>
</body>
</html>
