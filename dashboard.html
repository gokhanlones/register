<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anasayfa | Astro Notlarım</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        /* Sabit karşılama alanı */
        .greeting-section {
            padding: 24px 20px 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #f3f4f6;
            flex-shrink: 0;
            text-align: center;
        }
        .greeting-text {
            font-size: 1.1rem;
            color: #6b7280;
            margin-bottom: 6px;
        }
        .user-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: -0.5px;
            min-height: 2.2rem; /* Yükleniyor... sızıntısını önle */
        }

        /* Scrollable içerik alanı */
        .dashboard-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }
        .dashboard-content::-webkit-scrollbar {
            width: 4px;
        }
        .dashboard-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .dashboard-content::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }

        /* Placeholder içerik kartları */
        .content-placeholder {
            background-color: #f9fafb;
            border: 1px dashed #d1d5db;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            color: #9ca3af;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="brand-section">
            <button class="btn-menu">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <h1>Astro Notlarım</h1>
        </header>

        <!-- Sabit Karşılama Alanı -->
        <div class="greeting-section" id="greetingSection">
            <div class="greeting-text">Merhaba</div>
            <div class="user-name" id="userName">...</div>
        </div>

        <!-- Kaydırılabilir İçerik Alanı -->
        <main class="dashboard-content" id="dashboardContent">
            <div class="content-placeholder">
                Buraya anasayfa içerikleri gelecek.
            </div>
        </main>

        <footer class="bottom-navbar">
            <a href="dashboard.html" class="nav-item active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="nav-label">Anasayfa</span>
            </a>
            <a href="ask.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span class="nav-label">Sor</span>
            </a>
            <a href="natal.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M2 12h20"></path><path d="M4.5 8h15"></path><path d="M4.5 16h15"></path></svg>
                <span class="nav-label">Harita</span>
            </a>
        </footer>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAFRhlbnY4Fq67Wl-E8yis5msD6K-QZjbU",
            authDomain: "astro-notlarim.firebaseapp.com",
            projectId: "astro-notlarim",
            storageBucket: "astro-notlarim.firebasestorage.app",
            messagingSenderId: "123654326926",
            appId: "1:123654326926:web:44ba9bf34fcea3bf5ad7df",
            measurementId: "G-19BSBWLJ7X"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Önce localStorage'dan cached ismi hemen göster
        const cachedName = localStorage.getItem('astro_user_name');
        if (cachedName) {
            document.getElementById('userName').textContent = cachedName;
        }

        // Sonra Firebase'den güncel veriyi çek
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            db.collection("user_profiles").doc(user.uid).get()
                .then((doc) => {
                    let fullname;
                    if (doc.exists && doc.data().fullname) {
                        fullname = doc.data().fullname;
                    } else {
                        fullname = user.displayName || "Kullanıcı";
                    }
                    
                    // DOM'u güncelle
                    document.getElementById('userName').textContent = fullname;
                    // Cache'e kaydet
                    localStorage.setItem('astro_user_name', fullname);
                })
                .catch(() => {
                    const fallbackName = user.displayName || "Kullanıcı";
                    document.getElementById('userName').textContent = fallbackName;
                    localStorage.setItem('astro_user_name', fallbackName);
                });
        });
    </script>
</body>
</html>
