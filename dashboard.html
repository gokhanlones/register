<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anasayfa | Astro Notlarım</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-remote-config-compat.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
        .greeting-section { padding: 20px 20px 12px; background-color: #ffffff; border-bottom: 1px solid #f3f4f6; flex-shrink: 0; text-align: center; }
        .user-name { font-size: 1.8rem; font-weight: 700; color: #d4af37; }
        .astro-icons { display: flex; justify-content: center; gap: 16px; margin-top: 8px; }
        .daily-horoscope-card { background-color: #ffffff; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #f3f4f6; }
        
        /* KÜÇÜLTÜLMÜŞ KATEGORİ BUTONLARI */
        .category-scroll-wrapper { padding: 8px 0; background-color: #ffffff; border-top: 1px solid #f3f4f6; flex-shrink: 0; }
        .category-scroll { display: flex; justify-content: center; gap: 6px; padding: 0 10px; }
        .category-btn { display: flex; align-items: center; justify-content: center; padding: 5px 12px; background-color: #f9fafb; border: 1px solid #e5e7eb; border-radius: 16px; cursor: pointer; transition: all 0.2s; min-width: 50px; }
        .category-text { font-size: 0.7rem; font-weight: 600; color: #374151; white-space: nowrap; }

        .dashboard-content { flex: 1; overflow-y: auto; padding: 20px; }
        .popup-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: flex-end; }
        .popup-overlay.show { display: flex; }
        .popup-content { background-color: #ffffff; width: 100%; max-width: 420px; border-radius: 20px 20px 0 0; padding: 24px 20px 32px; transform: translateY(100%); transition: transform 0.3s ease-out; max-height: 70vh; overflow-y: auto; }
        .popup-overlay.show .popup-content { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="brand-section">
            <h1>Astro Notlarım</h1>
        </header>

        <div class="greeting-section" id="greetingSection">
            <div class="user-name" id="userName">...</div>
            <div class="astro-icons">
                </div>
        </div>

        <main class="dashboard-content" id="dashboardContent">
            <div id="horoscopeCard"></div>
        </main>

        <div class="category-scroll-wrapper">
            <div class="category-scroll">
                <button class="category-btn" onclick="openCategoryPopup('health')"><span class="category-text">Sağlık</span></button>
                <button class="category-btn" onclick="openCategoryPopup('love')"><span class="category-text">Aşk</span></button>
                <button class="category-btn" onclick="openCategoryPopup('career')"><span class="category-text">Kariyer</span></button>
                <button class="category-btn" onclick="openCategoryPopup('money')"><span class="category-text">Para</span></button>
            </div>
        </div>
    </div>

    <script>
        // ... (Scriptlerin aynı kalacak) ...
        function openCategoryPopup(type) {
            // ... (Popup mantığı aynı) ...
        }
    </script>
</body>
</html>
