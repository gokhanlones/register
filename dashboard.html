<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anasayfa | Astro Notlarım</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-service.js"></script>

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        .greeting-section {
            padding: 20px 20px 12px;
            background-color: #ffffff;
            border-bottom: 1px solid #f3f4f6;
            flex-shrink: 0;
            text-align: center;
        }
        .greeting-text {
            font-size: 1.1rem;
            color: #6b7280;
            margin-bottom: 6px;
        }
        .user-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: -0.5px;
            min-height: 2.2rem;
        }

        .astro-icons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 8px;
        }
        .astro-icon-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            transition: transform 0.2s;
            outline: none;
        }
        .astro-icon-btn:active {
            transform: scale(0.95);
        }
        .astro-icon-btn svg {
            width: 48px;
            height: 48px;
            padding: 10px;
            border-radius: 50%;
            background-color: #f9fafb;
            border: 2px solid #e5e7eb;
            color: #d4af37;
            transition: all 0.2s;
        }
        .astro-icon-btn:hover svg {
            background-color: #000000;
            border-color: #000000;
            color: #d4af37;
        }
        .astro-icon-btn span {
            font-size: 0.75rem;
            color: #6b7280;
            font-weight: 500;
        }

        .daily-horoscope-card {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            color: #1f2937;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #f3f4f6;
        }
        .daily-horoscope-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .daily-horoscope-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #d4af37;
        }
        .daily-horoscope-date {
            font-size: 0.8rem;
            color: #9ca3af;
        }
        .daily-horoscope-text {
            font-size: 0.95rem;
            line-height: 1.7;
            color: #374151;
            margin-bottom: 16px;
        }
        .score-bars {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .score-bar-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .score-bar-label {
            font-size: 0.8rem;
            color: #6b7280;
            width: 60px;
            text-align: right;
            font-weight: 500;
        }
        .score-bar-track {
            flex: 1;
            height: 8px;
            background-color: #f3f4f6;
            border-radius: 4px;
            overflow: hidden;
        }
        .score-bar-fill {
            height: 100%;
            border-radius: 4px;
            background-color: #d4af37;
            transition: width 0.5s ease;
        }
        .score-bar-value {
            font-size: 0.8rem;
            color: #d4af37;
            width: 30px;
            font-weight: 600;
        }

        .lucky-info {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #f3f4f6;
        }
        .lucky-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #6b7280;
        }
        .lucky-item svg {
            width: 16px;
            height: 16px;
            color: #d4af37;
        }

        .category-scroll-wrapper {
            padding: 16px 0;
            background-color: #ffffff;
            border-top: 1px solid #f3f4f6;
            flex-shrink: 0;
        }
        .category-scroll {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 0 20px;
        }
        .category-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            min-width: 70px;
        }
        .category-btn:active {
            transform: scale(0.95);
        }
        .category-btn:hover {
            background-color: #000000;
            border-color: #000000;
        }
        .category-btn:hover .category-text {
            color: #d4af37;
        }
        .category-text {
            font-size: 0.8rem;
            font-weight: 600;
            color: #374151;
            white-space: nowrap;
        }

        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: flex-end;
        }
        .popup-overlay.show {
            display: flex;
        }
        .popup-content {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 20px 20px 0 0;
            padding: 24px 20px 32px;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            max-height: 70vh;
            overflow-y: auto;
        }
        .popup-overlay.show .popup-content {
            transform: translateY(0);
        }
        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 1px solid #f3f4f6;
            padding-bottom: 12px;
        }
        .popup-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #000000;
        }
        .popup-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px;
            outline: none;
        }
        .popup-body {
            color: #4b5563;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .popup-score {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .popup-score-bar {
            flex: 1;
            height: 10px;
            background-color: #f3f4f6;
            border-radius: 5px;
            overflow: hidden;
        }
        .popup-score-fill {
            height: 100%;
            border-radius: 5px;
            background-color: #d4af37;
        }
        .popup-score-value {
            font-size: 1rem;
            font-weight: 700;
            color: #d4af37;
            width: 40px;
            text-align: right;
        }

        .astro-signs-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
            padding: 0 16px;
        }
        .astro-sign-card {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            transition: all 0.2s;
        }
        .astro-sign-card svg {
            width: 20px;
            height: 20px;
            color: #d4af37;
            flex-shrink: 0;
        }
        .astro-sign-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #374151;
            white-space: nowrap;
        }

        .dashboard-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }
        .dashboard-content::-webkit-scrollbar {
            width: 4px;
        }
        .dashboard-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .dashboard-content::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="app-container">
        <header class="brand-section">
            <button class="btn-menu">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <h1>Astro Notlarım</h1>
        </header>

        <div class="greeting-section">
            <div class="greeting-text">Merhaba</div>
            <div class="user-name" id="userName">...</div>

            <div class="astro-signs-row" id="astroSignsRow">
                <div class="astro-sign-card">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <span class="astro-sign-label" id="sunSign">...</span>
                </div>
                <div class="astro-sign-card">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="16 12 12 8 8 12"></polyline>
                        <line x1="12" y1="16" x2="12" y2="8"></line>
                    </svg>
                    <span class="astro-sign-label" id="risingSign">...</span>
                </div>
                <div class="astro-sign-card">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <span class="astro-sign-label" id="moonSign">...</span>
                </div>
            </div>
        </div>

        <main class="dashboard-content">
            <!-- Orta alan placeholder -->
        </main>

        <div class="category-scroll-wrapper">
            <div class="category-scroll">
                <button class="category-btn">
                    <span class="category-text">Sağlık</span>
                </button>
                <button class="category-btn">
                    <span class="category-text">Aşk</span>
                </button>
                <button class="category-btn">
                    <span class="category-text">Kariyer</span>
                </button>
                <button class="category-btn">
                    <span class="category-text">Para</span>
                </button>
            </div>
        </div>

        <footer class="bottom-navbar">
            <a href="dashboard.html" class="nav-item active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="nav-label">Anasayfa</span>
            </a>
            <a href="ask.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span class="nav-label">Sor</span>
            </a>
            <a href="natal.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M2 12h20"></path><path d="M4.5 8h15"></path><path d="M4.5 16h15"></path></svg>
                <span class="nav-label">Harita</span>
            </a>
        </footer>
    </div>

    <script>
        AstroService.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            loadUserName(user);
        });

        async function loadUserName(user) {
            try {
                const data = await AstroService.getUserProfile(user.uid);
                if (data) {
                    const fullname = data.fullname || user.displayName || "Kullanıcı";
                    document.getElementById('userName').textContent = fullname;

                    const signs = await AstroService.getUserSigns(user.uid);
                    if (signs.sunSign) document.getElementById('sunSign').textContent = signs.sunSign;
                    if (signs.moonSign) document.getElementById('moonSign').textContent = signs.moonSign;
                    if (signs.risingSign) document.getElementById('risingSign').textContent = signs.risingSign;
                } else {
                    document.getElementById('userName').textContent = user.displayName || "Kullanıcı";
                }
            } catch (err) {
                console.error("İsim çekme hatası:", err);
                document.getElementById('userName').textContent = user.displayName || "Kullanıcı";
            }
        }
    </script>
</body>
</html>
