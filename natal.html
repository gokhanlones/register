<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğum Haritası | Astro Notlarım</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #d4af37;
            margin: 24px 0 12px 0;
            padding: 0 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: "";
            width: 4px;
            height: 20px;
            background-color: #d4af37;
            border-radius: 2px;
        }

        /* === EVLER KARTI === */
        .house-card {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            border: 1px solid #f3f4f6;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .house-sign-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #000000;
            color: #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .house-degree {
            font-size: 1rem;
            font-weight: 600;
            color: #1f2937;
            width: 70px;
            text-align: center;
            flex-shrink: 0;
        }
        .house-info {
            flex: 1;
            text-align: right;
        }
        .house-name {
            font-size: 1rem;
            font-weight: 600;
            color: #1f2937;
        }
        .house-cusp {
            font-size: 0.75rem;
            color: #d4af37;
            font-weight: 500;
            background-color: #fefce8;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
        }

        /* === BURÇ KARTI (Gezegenler + Noktalar Gruplu) === */
        .sign-group-card {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            border: 1px solid #f3f4f6;
        }
        .sign-group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f3f4f6;
        }
        .sign-group-icon {
            font-size: 1.4rem;
            color: #d4af37;
            flex-shrink: 0;
        }
        .sign-group-name {
            font-size: 1rem;
            font-weight: 700;
            color: #1f2937;
        }
        .sign-group-count {
            font-size: 0.75rem;
            color: #9ca3af;
            font-weight: 500;
            margin-left: auto;
        }
        .celestial-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f9fafb;
        }
        .celestial-item:last-child {
            border-bottom: none;
        }
        .celestial-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .celestial-symbol {
            font-size: 1.1rem;
            color: #d4af37;
            width: 24px;
            text-align: center;
        }
        .celestial-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: #374151;
        }
        .celestial-retro {
            font-size: 0.65rem;
            color: #ef4444;
            font-weight: 600;
            background-color: #fef2f2;
            padding: 1px 5px;
            border-radius: 6px;
            margin-left: 4px;
        }
        .celestial-right {
            text-align: right;
        }
        .celestial-degree {
            font-size: 0.85rem;
            font-weight: 600;
            color: #1f2937;
        }
        .celestial-house {
            font-size: 0.75rem;
            color: #9ca3af;
        }
        .empty-sign {
            font-size: 0.85rem;
            color: #d1d5db;
            font-style: italic;
            padding: 8px 0;
            text-align: center;
        }

        /* === AÇI KARTI === */
        .aspect-card {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            border: 1px solid #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .aspect-planets {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #374151;
        }
        .aspect-symbol {
            font-size: 1.1rem;
            color: #d4af37;
            font-weight: 700;
        }
        .aspect-details {
            text-align: right;
        }
        .aspect-type {
            font-size: 0.8rem;
            font-weight: 600;
            color: #1f2937;
        }
        .aspect-orb {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 2px;
        }

        .natal-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
            -webkit-overflow-scrolling: touch;
        }
        .natal-content::-webkit-scrollbar {
            width: 4px;
        }
        .natal-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .natal-content::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="app-container">
        <header class="brand-section">
            <button class="btn-menu" onclick="window.history.back()">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <h1>Doğum Haritası</h1>
        </header>

        <main class="natal-content" id="natalContent">
            <!-- İçerik JavaScript ile doldurulacak -->
        </main>

        <footer class="bottom-navbar">
            <a href="dashboard.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="nav-label">Anasayfa</span>
            </a>
            <a href="ask.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span class="nav-label">Sor</span>
            </a>
            <a href="natal.html" class="nav-item active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M2 12h20"></path><path d="M4.5 8h15"></path><path d="M4.5 16h15"></path></svg>
                <span class="nav-label">Harita</span>
            </a>
        </footer>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAFRhlbnY4Fq67Wl-E8yis5msD6K-QZjbU",
            authDomain: "astro-notlarim.firebaseapp.com",
            projectId: "astro-notlarim",
            storageBucket: "astro-notlarim.firebasestorage.app",
            messagingSenderId: "123654326926",
            appId: "1:123654326926:web:44ba9bf34fcea3bf5ad7df",
            measurementId: "G-19BSBWLJ7X"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = null;
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                loadNatalChart(user);
            } else {
                window.location.href = 'login.html';
            }
        });

        async function loadNatalChart(user) {
            try {
                const doc = await db.collection("user_profiles").doc(user.uid).get();
                if (!doc.exists) {
                    document.getElementById('natalContent').innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af;">Doğum bilgileriniz bulunamadı.</div>';
                    return;
                }
                const data = doc.data();
                const chart = data.natalChart;
                if (!chart) {
                    document.getElementById('natalContent').innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af;">Doğum haritası verisi bulunamadı.</div>';
                    return;
                }
                renderNatalChart(chart);
            } catch (err) {
                console.error("Harita çekme hatası:", err);
                document.getElementById('natalContent').innerHTML = '<div style="text-align:center;padding:40px;color:#ef4444;">Veri yüklenirken hata oluştu.</div>';
            }
        }

        function renderNatalChart(chart) {
            const container = document.getElementById('natalContent');
            let html = '';

            // === EVLER ===
            if (chart.houses && chart.houses.length > 0) {
                html += '<div class="section-title">Evler</div>';
                chart.houses.forEach(h => {
                    const isAsc = h.house === 1;
                    const isMc = h.house === 10;
                    const isIc = h.house === 4;
                    const isDc = h.house === 7;
                    let label = '';
                    if (isAsc) label = '<span class="house-cusp">Yükselen</span>';
                    if (isMc) label = '<span class="house-cusp">MC</span>';
                    if (isIc) label = '<span class="house-cusp">IC</span>';
                    if (isDc) label = '<span class="house-cusp">DC</span>';
                    html += `
                        <div class="house-card">
                            <div class="house-sign-icon">${getSignSymbol(h.sign_id)}</div>
                            <div class="house-degree">${formatDegree(h.pos)}</div>
                            <div class="house-info">
                                <span class="house-name">${h.sign} ${label}</span>
                            </div>
                        </div>
                    `;
                });
            }

            // === GEZEGENLER + NOKTALAR (Burçlara Göre Gruplu) ===
            const allCelestials = [];

            // Gezegenleri ekle
            if (chart.planets) {
                chart.planets.forEach(p => {
                    allCelestials.push({
                        id: p.id,
                        name: p.name,
                        sign_id: p.sign_id,
                        sign: p.sign,
                        pos: p.pos,
                        house: p.house,
                        retrograde: p.retrograde || false,
                        type: 'planet'
                    });
                });
            }

            // Noktaları ekle (angles_details)
            if (chart.angles_details) {
                const angleMap = {
                    'asc': { name: 'Yükselen (ASC)', house: 1 },
                    'mc': { name: 'MC (Ortay)', house: 10 },
                    'ic': { name: 'IC (Gökyüzü)', house: 4 },
                    'dc': { name: 'DC (Batı)', house: 7 },
                    'vertex': { name: 'Vertex', house: null }
                };

                for (const [key, angle] of Object.entries(chart.angles_details)) {
                    if (angleMap[key]) {
                        allCelestials.push({
                            id: key,
                            name: angleMap[key].name,
                            sign_id: angle.sign_id,
                            sign: angle.sign,
                            pos: angle.pos,
                            house: angleMap[key].house || angle.house,
                            retrograde: false,
                            type: 'point'
                        });
                    }
                }
            }

            // Lilith ve Chiron'u planets'ten zaten aldık, ekstra kontrol
            if (chart.planets) {
                const extraPoints = ['lilith', 'chiron', 'north_node'];
                extraPoints.forEach(ep => {
                    const exists = allCelestials.find(c => c.id === ep);
                    if (!exists) {
                        const p = chart.planets.find(pl => pl.id === ep);
                        if (p) {
                            allCelestials.push({
                                id: p.id,
                                name: p.name,
                                sign_id: p.sign_id,
                                sign: p.sign,
                                pos: p.pos,
                                house: p.house,
                                retrograde: p.retrograde || false,
                                type: 'point'
                            });
                        }
                    }
                });
            }

            if (allCelestials.length > 0) {
                html += '<div class="section-title">Gezegenler ve Noktalar</div>';

                // Tüm burçları tanımla (sıralı)
                const allSigns = [
                    { id: 'aries', name: 'Koç', symbol: '♈' },
                    { id: 'taurus', name: 'Boğa', symbol: '♉' },
                    { id: 'gemini', name: 'İkizler', symbol: '♊' },
                    { id: 'cancer', name: 'Yengeç', symbol: '♋' },
                    { id: 'leo', name: 'Aslan', symbol: '♌' },
                    { id: 'virgo', name: 'Başak', symbol: '♍' },
                    { id: 'libra', name: 'Terazi', symbol: '♎' },
                    { id: 'scorpio', name: 'Akrep', symbol: '♏' },
                    { id: 'sagittarius', name: 'Yay', symbol: '♐' },
                    { id: 'capricorn', name: 'Oğlak', symbol: '♑' },
                    { id: 'aquarius', name: 'Kova', symbol: '♒' },
                    { id: 'pisces', name: 'Balık', symbol: '♓' }
                ];

                // Gökcisimlerini burçlara göre grupla
                const celestialsBySign = {};
                allCelestials.forEach(c => {
                    if (!celestialsBySign[c.sign_id]) {
                        celestialsBySign[c.sign_id] = [];
                    }
                    celestialsBySign[c.sign_id].push(c);
                });

                // Her burç için kart oluştur (boş burçlar da dahil)
                allSigns.forEach(sign => {
                    const celestialsInSign = celestialsBySign[sign.id] || [];
                    const count = celestialsInSign.length;

                    html += `
                        <div class="sign-group-card">
                            <div class="sign-group-header">
                                <span class="sign-group-icon">${sign.symbol}</span>
                                <span class="sign-group-name">${sign.name}</span>
                                <span class="sign-group-count">${count > 0 ? count + ' gökcismi' : 'Boş'}</span>
                            </div>
                    `;

                    if (celestialsInSign.length > 0) {
                        // Dereceye göre sırala
                        celestialsInSign.sort((a, b) => a.pos - b.pos);

                        celestialsInSign.forEach(c => {
                            const retro = c.retrograde ? '<span class="celestial-retro">R</span>' : '';
                            const houseInfo = c.house ? `<div class="celestial-house">${c.house}. Ev</div>` : '';
                            html += `
                                <div class="celestial-item">
                                    <div class="celestial-left">
                                        <span class="celestial-symbol">${getCelestialSymbol(c.id)}</span>
                                        <span class="celestial-name">${c.name}${retro}</span>
                                    </div>
                                    <div class="celestial-right">
                                        <div class="celestial-degree">${formatDegree(c.pos)}</div>
                                        ${houseInfo}
                                    </div>
                                </div>
                            `;
                        });
                    } else {
                        html += '<div class="empty-sign">Bu burçta gökcismi yok</div>';
                    }

                    html += '</div>';
                });
            }

            // === AÇILAR ===
            if (chart.aspects && chart.aspects.length > 0) {
                html += '<div class="section-title">Açılar</div>';
                chart.aspects.forEach(a => {
                    html += `
                        <div class="aspect-card">
                            <div class="aspect-planets">
                                <span>${getCelestialSymbol(a.p1)} ${capitalize(a.p1)}</span>
                                <span class="aspect-symbol">${getAspectSymbol(a.type)}</span>
                                <span>${capitalize(a.p2)} ${getCelestialSymbol(a.p2)}</span>
                            </div>
                            <div class="aspect-details">
                                <div class="aspect-type">${capitalize(a.type)} ${a.deg}°</div>
                                <div class="aspect-orb">Orb: ${a.orb}°</div>
                            </div>
                        </div>
                    `;
                });
            }

            container.innerHTML = html;
        }

        // Yardımcı fonksiyonlar
        function getSignSymbol(signId) {
            const symbols = {
                'aries': '♈', 'taurus': '♉', 'gemini': '♊', 'cancer': '♋',
                'leo': '♌', 'virgo': '♍', 'libra': '♎', 'scorpio': '♏',
                'sagittarius': '♐', 'capricorn': '♑', 'aquarius': '♒', 'pisces': '♓'
            };
            return symbols[signId] || '';
        }

        function getCelestialSymbol(id) {
            const symbols = {
                'sun': '☉', 'moon': '☽', 'mercury': '☿', 'venus': '♀',
                'mars': '♂', 'jupiter': '♃', 'saturn': '♄', 'uranus': '♅',
                'neptune': '♆', 'pluto': '♇', 'north_node': '☊', 'lilith': '⚸',
                'chiron': '⚷', 'asc': '⬆️', 'mc': '🔝', 'ic': '⬇️', 'dc': '➡️',
                'vertex': '🔹'
            };
            return symbols[id] || '●';
        }

        function getAspectSymbol(type) {
            const symbols = {
                'conjunction': '☌', 'sextile': '⚹', 'square': '□',
                'trine': '△', 'opposition': '☍'
            };
            return symbols[type] || '◆';
        }

        function formatDegree(pos) {
            const deg = Math.floor(pos);
            const min = Math.floor((pos - deg) * 60);
            return `${deg}° ${min.toString().padStart(2, '0')}'`;
        }

        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1).replace(/_/g, ' ');
        }
    </script>
</body>
</html>
