<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | Özgün Prototipim</title>
    <!-- Kendi tasarlayacağınız CSS dosyasını buraya bağlayacağız -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="register-container">
        <!-- Kayıt Formu Alanı -->
        <section class="register-card">
            <h2>Yeni Hesap Oluştur</h2>
            <p>Aramıza katılmak için lütfen aşağıdaki bilgileri doldurun.</p>

            <form action="#" method="POST" class="register-form">
                
                <!-- Ad Soyad Alanı -->
                <div class="form-group">
                    <label for="fullname">Ad Soyad</label>
                    <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
                </div>

                <!-- E-posta Alanı -->
                <div class="form-group">
                    <label for="email">E-posta Adresi</label>
                    <input type="email" id="email" name="email" placeholder="ornek@eposta.com" required>
                </div>

                <!-- Şifre Alanı -->
                <div class="form-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <!-- Şifre Tekrar Alanı -->
                <div class="form-group">
                    <label for="password-confirm">Şifreyi Tekrar Girin</label>
                    <input type="password" id="password-confirm" name="password-confirm" placeholder="••••••••" required>
                </div>

                <!-- Sözleşme Onayı -->
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">
                        <a href="#">Kullanım Şartları</a> ve <a href="#">Gizlilik Politikası</a>'nı kabul ediyorum.
                    </label>
                </div>

                <!-- Kayıt Butonu -->
                <button type="submit" class="btn-submit">Kayıt Ol</button>

            </form>

            <!-- Giriş Yap Linki -->
            <div class="register-footer">
                <p>Zaten bir hesabınız var mı? <a href="login.html">Giriş Yap</a></p>
            </div>
        </section>
    </main>

</body>
</html>
