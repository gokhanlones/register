<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | Astro Notlarım</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <header class="brand-section">
            <div class="logo-wrapper">
                <img src="logo.png" alt="Astro Notlarım Logo" class="logo-img">
            </div>
            <h1>Astro Notlarım</h1>
        </header>

        <main class="scrollable-form-section">
            <form action="#" method="POST" class="register-form">
                
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="text" id="fullname" name="fullname" placeholder="İsim Soyisim" required>
                    </div>
                    <div class="error-message">Lütfen geçerli bir isim ve soyisim girin.</div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="E-posta" required>
                    </div>
                    <div class="error-message">E-posta adresi hatalı veya zaten kullanımda.</div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="password-input" placeholder="Şifre" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="eye-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                    <div class="error-message">Şifre en az 6 karakterden oluşmalıdır.</div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" id="password-confirm" name="password-confirm" class="password-input" placeholder="Şifreyi doğrula" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password-confirm', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="eye-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                    <div class="error-message">Girdiğiniz şifreler birbiriyle eşleşmiyor.</div>
                </div>

                <button type="submit" class="btn-submit">Kaydet</button>

            </form>

            <footer class="register-footer">
                <p>Zaten üye misin? <a href="login.html">Giriş</a></p>
            </footer>
        </main>

    </div>

    <script>
        function togglePasswordVisibility(inputId, button) {
            const passwordInput = document.getElementById(inputId);
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                button.classList.add("visible");
            } else {
                passwordInput.type = "password";
                button.classList.remove("visible");
            }
        }
    </script>

</body>
</html>
