<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | Astro Notlarım</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <!-- SABİT ÜST ALAN (Logo ve Başlık) -->
        <header class="brand-section">
            <div class="logo-wrapper">
                   <img src="logo.png" alt="Astro Notlarım Logo" class="logo-img">
                    <path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.38 5.38 0 01-4.4 2.26 5.4 5.4 0 01-5.4-5.4c0-1.81 1-3.39 2.45-4.24A9.12 9.12 0 0012 3z"/>
                </svg>
            </div>
        <h1>Astro Notlarım</h1>
        </header>

        <!-- KAYDIRILABİLİR ALT ALAN -->
        <main class="scrollable-form-section">
            <form action="#" method="POST" class="register-form">
                
                <!-- İsim Soyisim -->
                <div class="form-group">
                    <label for="fullname">İsim Soyisim</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Adınız ve soyadınız" required>
                </div>

                <!-- E-posta -->
                <div class="form-group">
                    <label for="email">E-posta</label>
                    <input type="email" id="email" name="email" placeholder="ornek@eposta.com" required>
                </div>

                <!-- Şifre -->
                <div class="form-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <!-- Şifreyi Doğrula -->
                <div class="form-group">
                    <label for="password-confirm">Şifreyi doğrula</label>
                    <input type="password" id="password-confirm" name="password-confirm" placeholder="••••••••" required>
                </div>

                <!-- Google ile Devam Et Butonu -->
                <button type="button" class="btn-google">
                    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Google ile devam et
                </button>

                <!-- Kaydet Butonu -->
                <button type="submit" class="btn-submit">Kaydet</button>

            </form>

            <!-- Alt Bilgi / Giriş Linki -->
            <footer class="register-footer">
                <p>Zaten üye misin? <a href="login.html">Giriş</a></p>
            </footer>
        </main>

    </div>

</body>
</html>
