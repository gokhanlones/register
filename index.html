<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Notlarım</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: '-apple-system', sans-serif; }
        html, body { width: 100%; height: 100%; background-color: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .splash-container { text-align: center; display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.6s ease-out; }
        .splash-logo { width: 90px; height: 90px; object-fit: contain; margin-bottom: 16px; }
        .splash-title { font-size: 1.6rem; font-weight: 700; color: #000000; letter-spacing: -0.5px; }
        .connection-status { margin-top: 20px; font-size: 0.85rem; color: #ef4444; font-weight: 500; display: none; }
        .loading-text { margin-top: 12px; font-size: 0.9rem; color: #9ca3af; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
<base target="_blank">
</head>
<body>

    <div class="splash-container">
        <img src="logo.png" alt="Astro Notlarım Logo" class="splash-logo">
        <h1 class="splash-title">Astro Notlarım</h1>
        <div class="loading-text" id="loadingText">Başlatılıyor...</div>
        <div class="connection-status" id="statusText">İnternet bağlantısı bekleniyor...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-remote-config-compat.js"></script>
    <script src="firebase-service.js"></script>

    <script>
        function checkAppConnection() {
            if (!navigator.onLine) {
                document.getElementById('statusText').style.display = 'block';
                document.getElementById('loadingText').style.display = 'none';
                window.addEventListener('online', function() {
                    AstroService.checkSessionAndRedirect();
                });
                return;
            }
            document.getElementById('loadingText').textContent = 'Oturum kontrol ediliyor...';
            AstroService.checkSessionAndRedirect();
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(checkAppConnection, 800);
        });
    </script>
</body>
</html>
