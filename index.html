<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Notlarım</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: '-apple-system', sans-serif; }
        html, body { width: 100%; height: 100%; background-color: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .splash-container { text-align: center; display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.6s ease-out; }
        .splash-logo { width: 90px; height: 90px; object-fit: contain; margin-bottom: 16px; }
        .splash-title { font-size: 1.6rem; font-weight: 700; color: #000000; letter-spacing: -0.5px; }
        .connection-status { margin-top: 20px; font-size: 0.85rem; color: #ef4444; font-weight: 500; display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.8/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.8/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.8/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="splash-container">
        <img src="logo.png" alt="Astro Notlarım Logo" class="splash-logo">
        <h1 class="splash-title">Astro Notlarım</h1>
        <div class="connection-status" id="statusText">İnternet bağlantısı bekleniyor...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAFRhlbnY4Fq67Wl-E8yis5msD6K-QZjbU",
            authDomain: "astro-notlarim.firebaseapp.com",
            projectId: "astro-notlarim",
            storageBucket: "astro-notlarim.firebasestorage.app",
            messagingSenderId: "123654326926",
            appId: "1:123654326926:web:44ba9bf34fcea3bf5ad7df",
            measurementId: "G-19BSBWLJ7X"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function checkAppConnection() {
            if (!navigator.onLine) {
                document.getElementById('statusText').style.display = 'block';
                window.addEventListener('online', function() {
                    checkAuthAndRedirect();
                });
                return;
            }
            checkAuthAndRedirect();
        }

        function checkAuthAndRedirect() {
            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    // Kullanıcı zaten giriş yapmış → doğum bilgisi kontrolü
                    db.collection("users").doc(user.uid).get()
                        .then((doc) => {
                            if (doc.exists && doc.data().birthYear) {
                                window.location.href = "dashboard.html";
                            } else {
                                window.location.href = "birthinfo.html";
                            }
                        })
                        .catch(() => {
                            window.location.href = "login.html";
                        });
                } else {
                    // Kullanıcı giriş yapmamış → login
                    window.location.href = "login.html";
                }
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(checkAppConnection, 800);
        });
    </script>
</body>
</html>
