<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | Astro Notlarım</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        .btn-google { background-color: #ffffff; border: 1px solid #d1d5db; color: #374151; margin-top: 10px; width: 100%; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-google:hover { background-color: #f9fafb; }
        .forgot-password { text-align: right; margin-top: 8px; margin-bottom: 20px; }
        .forgot-password a { font-size: 0.85rem; color: #6b7280; text-decoration: none; }
        .forgot-password a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="brand-section">
            <div class="logo-wrapper">
                <img src="logo.png" alt="Astro Notlarım Logo" class="logo-img">
            </div>
            <h1>Astro Notlarım</h1>
        </header>

        <main class="scrollable-form-section">
            <form class="register-form" id="loginForm" onsubmit="return false;">
                
                <div class="form-group" id="group-email">
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="E-posta">
                    </div>
                    <div class="error-message">Lütfen geçerli bir e-posta adresi girin.</div>
                </div>

                <div class="form-group" id="group-password">
                    <div class="input-wrapper">
                        <input type="password" id="password" class="password-input" placeholder="Şifre">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="eye-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>
                        </button>
                    </div>
                    <div class="error-message">Şifre alanı boş bırakılamaz.</div>
                </div>

                <div class="forgot-password">
                    <a href="#" onclick="handleForgotPassword()">Şifremi unuttum</a>
                </div>

                <button type="button" class="btn-submit" id="loginBtn" onclick="handleLogin()">Giriş Yap</button>
                <button type="button" class="btn-google" onclick="handleGoogleLogin()">Google ile Devam Et</button>
            </form>

            <footer class="register-footer">
                <p>Üye değil misin? <a href="register.html">Kayıt ol</a></p>
            </footer>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAFRhlbnY4Fq67Wl-E8yis5msD6K-QZjbU",
            authDomain: "astro-notlarim.firebaseapp.com",
            projectId: "astro-notlarim",
            storageBucket: "astro-notlarim.firebasestorage.app",
            messagingSenderId: "123654326926",
            appId: "1:123654326926:web:44ba9bf34fcea3bf5ad7df",
            measurementId: "G-19BSBWLJ7X"
        };
        firebase.initializeApp(firebaseConfig);

        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            input.type = input.type === "password" ? "text" : "password";
            button.classList.toggle("visible");
        }

        // Email Format Kontrolü
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function handleLogin() {
            // Hata temizleme
            document.querySelectorAll('.form-group').forEach(el => el.classList.remove('has-error'));
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            let isValid = true;

            // Kontroller
            if (!validateEmail(email)) {
                document.getElementById('group-email').classList.add('has-error');
                isValid = false;
            }
            if (password === "") {
                document.getElementById('group-password').classList.add('has-error');
                isValid = false;
            }

            if (!isValid) return;

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = "Giriş yapılıyor...";

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(() => window.location.href = "dashboard.html")
                .catch(err => {
                    alert("Hata: " + err.message);
                    btn.disabled = false;
                    btn.textContent = "Giriş Yap";
                });
        }

        function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .then(() => window.location.href = "dashboard.html")
                .catch(err => alert("Google girişi başarısız: " + err.message));
        }

        function handleForgotPassword() {
            const email = document.getElementById('email').value.trim();
            if (!validateEmail(email)) { 
                alert("Lütfen önce geçerli bir e-posta adresi girin."); 
                return; 
            }
            firebase.auth().sendPasswordResetEmail(email)
                .then(() => alert("Şifre sıfırlama bağlantısı " + email + " adresine gönderildi."))
                .catch(err => alert(err.message));
        }
    </script>
</body>
</html>
