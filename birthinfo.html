<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğum Bilgileri | Astro Notlarım</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-remote-config-compat.js"></script>
    
    <script src="firebase-service.js"></script>

    <style>
        .gender-group { display: flex; gap: 12px; margin-bottom: 18px; }
        .gender-option { flex: 1; position: relative; }
        .gender-option input { position: absolute; opacity: 0; width: 0; height: 0; }
        .gender-label { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; border: 1px solid #d4af37; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 0.95rem; font-weight: 500; color: #6b7280; background-color: #ffffff; }
        .gender-option input:checked + .gender-label { background-color: #d4af37; color: #ffffff; border-color: #d4af37; }
        .error-box { color: #ef4444; margin-bottom: 15px; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="brand-section">
            <h1>Doğum Bilgileri</h1>
        </header>

        <main class="scrollable-form-section">
            <div id="errorBox" class="error-box"></div>
            
            <form id="birthInfoForm" onsubmit="return false;">
                <button type="button" id="saveBtn" class="btn-submit" onclick="saveData()">Kaydet</button>
            </form>
        </main>
    </div>

    <script>
        // Hata gösterim fonksiyonu
        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
        }

        async function saveData() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = 'Kaydediliyor...';
            
            try {
                const currentUser = AstroService.auth.currentUser;
                if (!currentUser) throw new Error("Oturum bulunamadı.");

                // ... (Diğer veri toplama işlemlerin) ...

                // Örnek veri yapısı
                const birthData = {
                    // ... form verilerin ...
                };

                await AstroService.saveBirthInfo(currentUser.uid, birthData);
                window.location.href = 'dashboard.html';
            } catch (err) {
                showError('Hata: ' + err.message);
                btn.disabled = false; 
                btn.textContent = 'Kaydet';
            }
        }
    </script>
</body>
</html>
