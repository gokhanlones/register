<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğum Bilgileri | Astro Notlarım</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-remote-config-compat.js"></script>

    <style>
        .gender-group { display: flex; gap: 12px; margin-bottom: 18px; }
        .gender-option { flex: 1; position: relative; }
        .gender-option input { position: absolute; opacity: 0; width: 0; height: 0; }
        .gender-label { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; border: 1px solid #d4af37; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 0.95rem; font-weight: 500; color: #6b7280; background-color: #ffffff; }
        .gender-option input:checked + .gender-label { background-color: #000000; color: #d4af37; border-color: #000000; }
        .inline-error { display: none; background-color: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 0.9rem; color: #991b1b; }
        .inline-error.show { display: block; }
        
        /* Şehir Öneri Popup Stilleri */
        .suggestions-popup { position: absolute; width: 100%; background: white; border: 1px solid #d4af37; border-radius: 8px; max-height: 200px; overflow-y: auto; z-index: 999; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 4px; }
        .suggestion-item { padding: 10px; cursor: pointer; font-size: 0.9rem; border-bottom: 1px solid #eee; }
        .suggestion-item:hover { background-color: #f3f4f6; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="brand-section">
            <button class="btn-menu" onclick="window.history.back()">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <h1>Doğum Bilgileri</h1>
        </header>

        <main class="scrollable-form-section">
            <form class="register-form" id="birthInfoForm" onsubmit="return false;">
                <div class="inline-error" id="formError"></div>

                <div class="form-group">
                    <label style="font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 8px; display: block;">Cinsiyet</label>
                    <div class="gender-group">
                        <div class="gender-option"><input type="radio" name="gender" id="gender-female" value="female"><label for="gender-female" class="gender-label">Kadın</label></div>
                        <div class="gender-option"><input type="radio" name="gender" id="gender-male" value="male"><label for="gender-male" class="gender-label">Erkek</label></div>
                    </div>
                </div>

                <div class="form-group"><label>Doğum Tarihi</label><input type="date" id="birthDate"></div>
                <div class="form-group"><label>Doğum Saati</label><input type="time" id="birthTime" step="60"></div>

                <div class="form-group" id="group-birthplace" style="position: relative;">
                    <label>Doğum Yeri</label>
                    <input type="text" id="birthPlace" placeholder="Ara: Şehir ismi girin..." autocomplete="off">
                    <div id="placeSuggestions" class="suggestions-popup" style="display: none;"></div>
                </div>

                <button type="button" class="btn-submit" id="saveBtn" onclick="handleSave()">Kaydet</button>
            </form>
        </main>
    </div>

    <script>
        const GEONAMES_USERNAME = 'gokhansenol';
        const firebaseConfig = { apiKey: "AIzaSyAFRhlbnY4Fq67Wl-E8yis5msD6K-QZjbU", authDomain: "astro-notlarim.firebaseapp.com", projectId: "astro-notlarim", storageBucket: "astro-notlarim.firebasestorage.app", messagingSenderId: "123654326926", appId: "1:123654326926:web:44ba9bf34fcea3bf5ad7df", measurementId: "G-19BSBWLJ7X" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const remoteConfig = firebase.remoteConfig();
        remoteConfig.settings = { minimumFetchIntervalMillis: 60000 };

        let currentUser = null;
        firebase.auth().onAuthStateChanged((user) => { if (user) currentUser = user; else window.location.href = 'login.html'; });

        // Şehir Otomatik Tamamlama
        const birthPlaceInput = document.getElementById('birthPlace');
        const suggestionsBox = document.getElementById('placeSuggestions');
        birthPlaceInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (query.length < 2) { suggestionsBox.style.display = 'none'; return; }
            try {
                const response = await fetch(`https://secure.geonames.org/searchJSON?q=${encodeURIComponent(query)}&maxRows=5&featureClass=P&lang=tr&country=TR&username=${GEONAMES_USERNAME}`);
                const data = await response.json();
                suggestionsBox.innerHTML = '';
                if (data.geonames && data.geonames.length > 0) {
                    data.geonames.forEach(place => {
                        const item = document.createElement('div');
                        item.className = 'suggestion-item';
                        item.textContent = `${place.name}, ${place.adminName1 || place.countryName}`;
                        item.onclick = () => { birthPlaceInput.value = item.textContent; suggestionsBox.style.display = 'none'; };
                        suggestionsBox.appendChild(item);
                    });
                    suggestionsBox.style.display = 'block';
                }
            } catch (err) { console.error(err); }
        });

        function showError(msg) { const err = document.getElementById('formError'); err.textContent = msg; err.classList.add('show'); }
        function hideError() { document.getElementById('formError').classList.remove('show'); }

        async function fetchDailyHoroscope(sign, apiKey) {
            const today = new Date().toISOString().split('T')[0];
            const response = await fetch(`https://api.freeastroapi.com/api/v2/horoscope/daily/sign?sign=${sign}&date=${today}&tz_str=Europe%2FLondon&locale=en`, { headers: { "x-api-key": apiKey } });
            return await response.json();
        }

        async function handleSave() {
            hideError();
            const gender = document.querySelector('input[name="gender"]:checked');
            const birthDate = document.getElementById('birthDate').value;
            const birthTime = document.getElementById('birthTime').value;
            const birthPlace = document.getElementById('birthPlace').value.trim();

            if (!gender || !birthDate || !birthTime || !birthPlace) { showError('Lütfen tüm alanları doldurun.'); return; }

            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.textContent = 'Hesaplanıyor...';

            try {
                await remoteConfig.fetchAndActivate();
                const apiKey = remoteConfig.getString('astro_api_key');
                const horoscopeData = await fetchDailyHoroscope("aries", apiKey);

                const birthData = {
                    gender: gender.value,
                    birthYear: Number(birthDate.split('-')[0]),
                    birthMonth: Number(birthDate.split('-')[1]),
                    birthDay: Number(birthDate.split('-')[2]),
                    birthHour: Number(birthTime.split(':')[0]),
                    birthMinute: Number(birthTime.split(':')[1]),
                    birthPlace: birthPlace,
                    dailyHoroscope: horoscopeData.data,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                await db.collection('user_profiles').doc(currentUser.uid).set(birthData, { merge: true });
                window.location.href = 'dashboard.html';
            } catch (err) {
                showError('Hata: ' + err.message);
                btn.disabled = false; btn.textContent = 'Kaydet';
            }
        }
    </script>
</body>
</html>
